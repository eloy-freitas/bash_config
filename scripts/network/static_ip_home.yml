network:
  version: 2
  renderer: networkd
  ethernets:
    wlp2s0: # verificar qual é interface padrão com comando ip addr
      dhcp4: no
      addresses:
        - 10.3.152.100/24
      routes:
        - to: default
          via: 10.3.152.1
      nameservers:
        addresses:
          - 10.3.152.100
          - 8.8.8.8
          - 8.8.4.4
    enp1s0:
      dhcp4: no
      addresses:
        - 10.3.152.100/24
      routes:
        - to: default
          via: 10.3.152.1
      nameservers:
        addresses:
          - 10.3.152.100
          - 8.8.8.8
          - 8.8.4.4 